<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0E1311" />
    <title>AI Learning Compiler · 学习页 / 填空题</title>

    <!--
    Phase 3 · Fill Blank 题变体 · §5.5.4 + §4.2.3
    ===========================================
    填空输入框嵌入题干，仅下划线，无边框无背景。

    §4.2.3 宽度自适应（V1.1 修订）：
      - 现代浏览器（Chrome 123+/Safari 17.4+/Firefox 134+）：
        field-sizing: content · 由 styles.css 处理
      - 老浏览器：JS mirror span 兜底（本原型实现）
      - 最小宽度 2ch，最大 320px
      - 过渡 120ms --ease-standard

    关键决策（§4.2.3 关键）：
      - 填空输入框嵌入题干而非独立显示
      - 降低"我要输入"的视觉压力（P2）

    反馈态：
      - 提交后判定答案是否在 acceptableAnswers 中
      - 答对：题干下划线变绿 + 解释面板
      - 答错：题干下划线变橙，下方显示正确答案 + 解释面板
  -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Noto+Serif+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230E1311'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='18' fill='%23D4A574' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E"
    />

    <link rel="stylesheet" href="./styles.css" />
    <script src="./mock-data.js"></script>
    <script src="./app.js"></script>

    <style>
      .learn-page {
        max-width: 720px;
        padding-top: var(--space-7);
      }

      .concept-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-4);
        margin-bottom: var(--space-1);
      }

      .concept-meta__step,
      .concept-meta__lighthouse {
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: var(--tracking-mono);
        color: var(--fg-tertiary);
      }

      .concept-meta__lighthouse strong {
        color: var(--accent-primary);
        font-weight: var(--weight-medium);
      }

      .concept-name {
        font-family: var(--font-serif);
        font-size: var(--text-2xl);
        font-weight: var(--weight-medium);
        color: var(--fg-primary);
        letter-spacing: var(--tracking-tight);
        margin-top: var(--space-4);
        margin-bottom: var(--space-5);
      }

      /* ---- Quiz stem with embedded fill-blank input ---- */
      .quiz-stem {
        font-family: var(--font-serif);
        font-size: var(--text-xl); /* 28px · inherited by inline input */
        line-height: 2.4; /* extra leading to accommodate the inline input */
        color: var(--fg-primary);
        margin-top: var(--space-5);
        margin-bottom: var(--space-6);
      }

      /* Override .option-fill-blank :focus border-bottom-color for state variants */
      .option-fill-blank.is-correct {
        border-bottom-color: var(--success);
        box-shadow: 0 1px 0 0 var(--success);
      }

      .option-fill-blank.is-wrong {
        border-bottom-color: var(--warning);
        box-shadow: 0 1px 0 0 var(--warning);
      }

      /* Mirror span for old browsers · hidden offscreen */
      .fill-mirror {
        position: absolute;
        visibility: hidden;
        white-space: pre;
        font-family: var(--font-serif);
        font-size: var(--text-xl);
        line-height: 1;
      }

      /* Correct answer reveal (after submit, if wrong) */
      .reveal-correct {
        display: none;
        font-family: var(--font-serif);
        font-size: var(--text-md);
        color: var(--fg-secondary);
        margin-top: var(--space-3);

        opacity: 0;
        transform: translateY(4px);
      }

      .reveal-correct.is-visible {
        display: block;
        animation: feedback-enter var(--duration-slow) var(--ease-standard) forwards;
        animation-delay: 80ms;
      }

      .reveal-correct__label {
        color: var(--fg-tertiary);
      }

      .reveal-correct__answer {
        color: var(--success);
        font-weight: var(--weight-medium);
      }

      /* Feedback block */
      .feedback-block {
        margin-top: var(--space-6);
      }

      .feedback-block .text-feedback {
        animation: none;
        opacity: 0;
        transform: translateY(4px);
        margin-bottom: var(--space-4);
      }

      .feedback-block .text-feedback.is-visible {
        animation: feedback-enter var(--duration-slow) var(--ease-standard) forwards;
        animation-delay: 80ms;
      }

      /* Submit area */
      .submit-area {
        display: flex;
        justify-content: flex-end;
        margin-top: var(--space-8);
      }

      .submit-area .btn-primary {
        min-width: 160px;
      }

      .submit-area .btn-primary .btn-label {
        display: inline-block;
        transition: opacity var(--duration-base) var(--ease-standard);
      }

      .submit-area .btn-primary.is-transitioning .btn-label {
        opacity: 0;
      }

      /* Demo panel */
      .demo-panel {
        position: fixed;
        right: var(--space-4);
        bottom: var(--space-4);
        z-index: 50;
        padding: var(--space-3);
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        min-width: 180px;
      }

      .demo-panel__title {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: var(--tracking-mono);
        text-transform: uppercase;
        color: var(--fg-tertiary);
        margin-bottom: var(--space-1);
      }

      .demo-panel__btn {
        padding: var(--space-2) var(--space-3);
        font-family: var(--font-mono);
        font-size: var(--text-xs);
        letter-spacing: var(--tracking-mono);
        text-transform: uppercase;
        color: var(--fg-secondary);
        background: transparent;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-sm);
        cursor: pointer;
        text-align: left;
        transition: all var(--duration-instant) var(--ease-standard);
      }

      .demo-panel__btn:hover {
        color: var(--fg-primary);
        border-color: var(--border-strong);
      }

      .demo-panel__btn.is-active {
        color: var(--accent-primary);
        border-color: var(--accent-primary);
      }

      @media (max-width: 767px) {
        .learn-page {
          padding-top: var(--space-5);
        }
        .quiz-stem {
          font-size: var(--text-lg);
        }
        .submit-area {
          position: sticky;
          bottom: 0;
          margin: var(--space-7) calc(-1 * var(--space-5)) calc(-1 * var(--space-7));
          padding: var(--space-4) var(--space-5);
          background: var(--bg-base);
          border-top: 1px solid var(--border-default);
          justify-content: stretch;
        }
        .submit-area .btn-primary {
          width: 100%;
          min-width: 0;
        }
        .demo-panel {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <a href="#main-content" class="skip-link">跳到主要内容</a>

    <div class="app-shell">
      <div id="nav-top-mount"></div>

      <main id="main-content" class="page learn-page" role="main">
        <div id="staircase-mount"></div>

        <div class="concept-meta">
          <span class="concept-meta__step" id="concept-step">Concept A · 第 7 步 / 共 8 步</span>
          <span class="concept-meta__lighthouse">距离费曼还有 <strong>3 步</strong></span>
        </div>

        <div class="progress-thin" role="presentation">
          <div class="progress-thin__fill" style="width: 87.5%"></div>
          <!-- 7/8 -->
        </div>

        <h2 class="concept-name">什么是检索</h2>

        <hr class="section-divider" />

        <p class="quiz-stem" id="quiz-stem">
          RAG 的全称是
          <input
            type="text"
            class="option-fill-blank"
            id="fill-input"
            placeholder="……"
            aria-label="填空"
            autocomplete="off"
            spellcheck="false"
          />
          -Augmented Generation。
        </p>

        <!-- Mirror span for old browsers (width fallback) -->
        <span class="fill-mirror" id="fill-mirror" aria-hidden="true"></span>

        <!-- Correct answer reveal (after wrong submit) -->
        <p class="reveal-correct" id="reveal-correct">
          <span class="reveal-correct__label">正确答案：</span>
          <span class="reveal-correct__answer" id="reveal-answer">Retrieval</span>
        </p>

        <!-- Feedback block -->
        <div class="feedback-block" aria-live="polite" aria-atomic="true">
          <p class="text-feedback" id="text-feedback">很好。</p>
          <div class="panel-explanation-wrapper" id="panel-wrapper">
            <div class="panel-explanation">
              <div class="panel-explanation__inner" id="panel-content">
                RAG 的 R 代表 Retrieval（检索）。 全名 Retrieval-Augmented
                Generation，即"检索增强生成"。
              </div>
            </div>
          </div>
        </div>

        <div class="submit-area">
          <button type="button" id="submit-btn" class="btn-primary" disabled aria-disabled="true">
            <span class="btn-label">继续</span>
          </button>
        </div>
      </main>
    </div>

    <!-- Demo panel -->
    <aside class="demo-panel" aria-hidden="true">
      <span class="demo-panel__title">演示状态</span>
      <button type="button" class="demo-panel__btn is-active" data-state="initial">初始</button>
      <button type="button" class="demo-panel__btn" data-state="correct">答对</button>
      <button type="button" class="demo-panel__btn" data-state="wrong">答错</button>
    </aside>

    <script>
      'use strict'

      const quiz = window.MOCK.quizzes['fill-blank']

      const fillInput = document.getElementById('fill-input')
      const fillMirror = document.getElementById('fill-mirror')
      const submitBtn = document.getElementById('submit-btn')
      const submitLabel = submitBtn.querySelector('.btn-label')
      const textFeedback = document.getElementById('text-feedback')
      const panelWrapper = document.getElementById('panel-wrapper')
      const panelContent = document.getElementById('panel-content')
      const revealCorrect = document.getElementById('reveal-correct')
      const revealAnswer = document.getElementById('reveal-answer')

      let isAnswered = false

      /* ---------- Width auto-grow (mirror span · old browser fallback) ---------- */
      /* styles.css already handles modern browsers via @supports (field-sizing: content) */

      function autoGrowWidth() {
        // Only run if field-sizing is not supported
        const cs = window.getComputedStyle(fillInput)
        if (cs.fieldSizing && cs.fieldSizing !== 'normal') return

        const text = fillInput.value || fillInput.placeholder
        fillMirror.textContent = text || 'XX'
        const rect = fillMirror.getBoundingClientRect()
        const width = Math.min(Math.max(rect.width + 16, 32), 320)
        fillInput.style.width = `${width}px`
      }

      fillInput.addEventListener('input', () => {
        autoGrowWidth()
        if (isAnswered) return
        const len = fillInput.value.trim().length
        submitBtn.disabled = len === 0
        submitBtn.setAttribute('aria-disabled', String(len === 0))
      })

      /* ---------- Submit ---------- */

      function checkAnswer() {
        const userAns = fillInput.value.trim()
        if (!userAns) return false
        const acceptable = quiz.acceptableAnswers.map((a) => a.toLowerCase().trim())
        return acceptable.includes(userAns.toLowerCase())
      }

      submitBtn.addEventListener('click', () => {
        if (isAnswered || submitBtn.disabled) return
        isAnswered = true
        fillInput.disabled = true
        submitBtn.disabled = true

        const isCorrect = checkAnswer()

        window.setTimeout(() => {
          // Mark input border color
          fillInput.classList.add(isCorrect ? 'is-correct' : 'is-wrong')

          // 280ms feedback phrase
          window.setTimeout(() => {
            textFeedback.textContent = isCorrect
              ? window.MOCKPickFeedback('correct')
              : window.MOCKPickFeedback('wrong')
            textFeedback.classList.add('is-visible')
          }, 80)

          // 440ms panel expand
          window.setTimeout(() => {
            panelContent.textContent = quiz.explanation
            panelWrapper.classList.add('panel-explanation-wrapper--open')
          }, 240)

          // If wrong · reveal correct answer below the input
          if (!isCorrect) {
            revealAnswer.textContent = quiz.answer
            window.setTimeout(() => {
              revealCorrect.classList.add('is-visible')
            }, 240)
          }

          // 840ms button text change
          window.setTimeout(() => {
            setSubmitLabel(isCorrect ? '下一题' : '再看一次')
            submitBtn.disabled = false
            submitBtn.setAttribute('aria-disabled', 'false')
          }, 640)
        }, 200) // Feedback Agent delay
      })

      function setSubmitLabel(label) {
        submitBtn.classList.add('is-transitioning')
        window.setTimeout(() => {
          submitLabel.textContent = label
          submitBtn.classList.remove('is-transitioning')
        }, 240)
      }

      /* ---------- Keyboard: Enter to submit / focus input ---------- */

      fillInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !submitBtn.disabled) {
          e.preventDefault()
          submitBtn.click()
        }
      })

      /* ---------- Demo state switcher ---------- */

      document.querySelectorAll('.demo-panel__btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document
            .querySelectorAll('.demo-panel__btn')
            .forEach((b) => b.classList.remove('is-active'))
          btn.classList.add('is-active')
          const state = btn.getAttribute('data-state')
          resetToState(state)
        })
      })

      function resetToState(state) {
        isAnswered = false
        fillInput.disabled = false
        fillInput.classList.remove('is-correct', 'is-wrong')
        textFeedback.classList.remove('is-visible')
        panelWrapper.classList.remove('panel-explanation-wrapper--open')
        revealCorrect.classList.remove('is-visible')

        switch (state) {
          case 'initial':
            fillInput.value = ''
            submitBtn.disabled = true
            submitBtn.setAttribute('aria-disabled', 'true')
            submitLabel.textContent = '继续'
            break
          case 'correct':
            fillInput.value = quiz.answer
            isAnswered = true
            fillInput.disabled = true
            fillInput.classList.add('is-correct')
            textFeedback.textContent = window.MOCKPickFeedback('correct')
            textFeedback.classList.add('is-visible')
            panelWrapper.classList.add('panel-explanation-wrapper--open')
            submitLabel.textContent = '下一题'
            submitBtn.disabled = false
            break
          case 'wrong':
            fillInput.value = 'Research'
            isAnswered = true
            fillInput.disabled = true
            fillInput.classList.add('is-wrong')
            textFeedback.textContent = window.MOCKPickFeedback('wrong')
            textFeedback.classList.add('is-visible')
            revealAnswer.textContent = quiz.answer
            panelContent.textContent = quiz.explanation
            panelWrapper.classList.add('panel-explanation-wrapper--open')
            revealCorrect.classList.add('is-visible')
            submitLabel.textContent = '再看一次'
            submitBtn.disabled = false
            break
        }
        autoGrowWidth()
      }

      /* ---------- Initial render ---------- */

      window.ALC.renderNavTop({
        back: '概览',
        backTarget: '03-overview.html',
        stage: 'concept',
      })

      window.ALC.renderStaircase({ activeStage: 'concept', activeConceptIndex: 0 })

      autoGrowWidth()
    </script>
  </body>
</html>
